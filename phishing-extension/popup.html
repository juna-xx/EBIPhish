<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EBI Phish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0c0f;
      --surface:    #111318;
      --border:     #1e2330;
      --text:       #e8ecf0;
      --text-dim:   #6b7a8d;
      --safe:       #22c55e;
      --warn:       #f59e0b;
      --danger:     #ef4444;
      --info:       #38bdf8;
      --accent:     #e8187c;
      --mono:       'Space Mono', monospace;
      --sans:       'Syne', sans-serif;
    }

    body {
      width: 380px;
      min-height: 160px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      padding: 10px 14px 9px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }
    .header-logo {
      height: 34px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .header-sub {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 1px;
      letter-spacing: 0.03em;
    }

    /* URL bar */
    .url-bar {
      padding: 8px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 0.68rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.02em;
    }

    /* Verdict banner */
    .verdict-banner {
      margin: 12px 14px 0;
      border-radius: 6px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }
    .verdict-banner.safe    { background: rgba(34,197,94,0.08);   border-color: rgba(34,197,94,0.25);   }
    .verdict-banner.warn    { background: rgba(245,158,11,0.08);  border-color: rgba(245,158,11,0.25);  }
    .verdict-banner.danger  { background: rgba(239,68,68,0.08);   border-color: rgba(239,68,68,0.25);   }
    .verdict-banner.blocked { background: rgba(239,68,68,0.12);   border-color: rgba(239,68,68,0.4);    }
    .verdict-banner.loading { background: rgba(56,189,248,0.06);  border-color: rgba(56,189,248,0.2);   }
    .verdict-banner.error   { background: rgba(107,114,128,0.08); border-color: rgba(107,114,128,0.25); }

    .verdict-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .safe    .verdict-dot { background: var(--safe);    box-shadow: 0 0 8px var(--safe);   }
    .warn    .verdict-dot { background: var(--warn);    box-shadow: 0 0 8px var(--warn);   }
    .danger  .verdict-dot { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }
    .blocked .verdict-dot { background: var(--danger);  box-shadow: 0 0 8px var(--danger); }
    .loading .verdict-dot { background: var(--info);    animation: pulse 1.2s ease-in-out infinite; }
    .error   .verdict-dot { background: var(--text-dim);}

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--info); }
      50%       { opacity: 0.4; box-shadow: none; }
    }

    .verdict-text { flex: 1; }
    .verdict-label {
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .safe    .verdict-label { color: var(--safe);     }
    .warn    .verdict-label { color: var(--warn);     }
    .danger  .verdict-label { color: var(--danger);   }
    .blocked .verdict-label { color: var(--danger);   }
    .loading .verdict-label { color: var(--info);     }
    .error   .verdict-label { color: var(--text-dim); }

    .verdict-sub {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Section title */
    .section-title {
      padding: 12px 16px 6px;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: var(--sans);
      font-weight: 600;
    }

    /* Findings table */
    .findings {
      margin: 0 14px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: visible;
    }

    .finding-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
      transition: background 0.15s;
    }
    .finding-row:last-child { border-bottom: none; }
    .finding-row:hover { background: rgba(255,255,255,0.02); }

    /* label area with tooltip trigger */
    .finding-label-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }

    .finding-label {
      font-size: 0.68rem;
      color: var(--text-dim);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Tooltip button */
    .tip-btn {
      flex-shrink: 0;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 1px solid #e8187c55;
      background: transparent;
      color: var(--accent);
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
      padding: 0;
      font-family: var(--sans);
    }
    .tip-btn:hover {
      background: rgba(232,24,124,0.12);
      border-color: var(--accent);
    }

    /* tooltip bubble */
    .tip-btn::after {
      content: attr(data-tip);
      position: absolute;
      left: 0;
      bottom: auto;
      transform: none;
      background: #1a1f2e;
      border: 1px solid var(--border);
      color: #c8d0dc;
      font-size: 0.62rem;
      font-weight: 400;
      font-family: var(--mono);
      line-height: 1.45;
      padding: 7px 9px;
      border-radius: 5px;
      width: 210px;
      white-space: normal;
      text-align: left;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s;
    }
    
    /* small arrow */
    .tip-btn::before {
      content: '';
      position: absolute;
      left: 8px;
      bottom: calc(100% + 1px);
      transform: none;
      border: 5px solid transparent;
      border-top-color: var(--border);
      z-index: 101;
      opacity: 0;
      transition: opacity 0.18s;
      pointer-events: none;
    }
    .tip-btn:hover::after,
    .tip-btn:hover::before { opacity: 1; }

    /* clip tooltip to viewport when near left/right edges */
    .finding-row:first-child .tip-btn::after { left: 0; transform: none; }

    .finding-value {
      font-size: 0.68rem;
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
    }
    .finding-value.ok    { color: var(--safe); }
    .finding-value.warn  { color: var(--warn); }
    .finding-value.info  { color: var(--info); font-weight: 400; }
    .finding-value.block { color: var(--text-dim); font-size: 0.6rem; }

    /* Misc states */
    .state-msg {
      padding: 20px 16px;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.72rem;
      line-height: 1.6;
    }

    /* Footer */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.6rem;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }
    .footer-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--safe);
      box-shadow: 0 0 4px var(--safe);
      display: inline-block;
      margin-right: 5px;
    }
    
    /* AI Summary Box */
.ai-summary-box {
  margin: 10px 14px 14px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: rgba(232, 24, 124, 0.06);
}

.ai-summary-title {
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 6px;
  font-family: var(--sans);
}

.ai-summary-text {
  font-size: 0.68rem;
  color: var(--text-dim);
  line-height: 1.5;
  font-family: var(--mono);
}
  </style>
</head>
